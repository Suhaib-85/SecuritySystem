<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Dashboard</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1a1a1a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        /* Status Indicator */
        .status-box {
            padding: 20px 40px;
            border-radius: 12px;
            background: #333;
            margin-bottom: 20px;
            text-align: center;
            border: 2px solid #555;
            transition: all 0.3s ease;
            width: 80%;
            max-width: 600px;
        }

        .status-box.active {
            border-color: #00ff00;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.3);
        }

        .status-box.inactive {
            border-color: #ff4444;
            box-shadow: 0 0 15px rgba(255, 68, 68, 0.3);
        }

        h1 {
            margin: 0;
            font-size: 2rem;
        }

        .sub-text {
            opacity: 0.7;
            margin-top: 5px;
        }

        /* Controls */
        button {
            padding: 15px 30px;
            font-size: 1.2rem;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background: #007bff;
            color: white;
            font-weight: bold;
            margin-bottom: 30px;
        }

        button:hover {
            background: #0056b3;
        }

        /* Event Log */
        #log {
            width: 90%;
            max-width: 800px;
            background: #000;
            border: 1px solid #444;
            padding: 10px;
            border-radius: 8px;
        }

        .entry {
            padding: 10px;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .entry.alert {
            color: #ff4444;
            border-left: 4px solid #ff4444;
        }

        .entry.video {
            color: #44aaff;
            border-left: 4px solid #44aaff;
        }

        /* Video Link Button */
        .video-btn {
            background: #44aaff;
            color: white;
            padding: 8px 16px;
            font-size: 0.9rem;
            margin-left: 10px;
            text-decoration: none;
            /* No underline */
            border-radius: 4px;
            display: inline-block;
            transition: background 0.2s;
        }

        .video-btn:hover {
            background: #2288dd;
        }
    </style>
</head>

<body>

    <div id="statusBox" class="status-box inactive">
        <h1 id="statusText">SYSTEM: LOADING...</h1>
        <div class="sub-text">Connecting to server...</div>
    </div>

    <button onclick="toggleSystem()">Toggle System Power</button>

    <h3>Event History (From MongoDB)</h3>
    <div id="log"></div>

    <script>
        const socket = io();
        const statusBox = document.getElementById('statusBox');
        const statusText = document.getElementById('statusText');
        const subText = document.querySelector('.sub-text');
        const logDiv = document.getElementById('log');

        let currentState = false;

        // --- 1. Load History ---
        async function loadHistory() {
            try {
                const res = await fetch('/api/events');
                const events = await res.json();
                logDiv.innerHTML = '';
                events.forEach(event => addEventToUI(event));
            } catch (err) {
                console.error("Failed to load history:", err);
            }
        }
        loadHistory();

        // --- 2. Real-time Listeners ---
        socket.on('state_update', (data) => {
            currentState = data.isActive;
            updateStatusUI(currentState);
        });

        socket.on('new_event', (event) => {
            addEventToUI(event);
        });

        // --- 3. UI Helper Functions ---
        function addEventToUI(event) {
            const entry = document.createElement('div');
            const time = new Date(event.timestamp).toLocaleTimeString();

            if (event.type === 'video') {
                entry.className = 'entry video';
                // THIS IS THE FIX: Just a simple link to video.html
                entry.innerHTML = `
                    <span><strong>${time}:</strong> Video Evidence Uploaded</span>
                    <a href="/video.html?id=${event.videoId}&name=${event.filename}" class="video-btn">
                        Watch Playback
                    </a>
                `;
            } else {
                entry.className = 'entry alert';
                entry.innerHTML = `<span><strong>${time}:</strong> ${event.message || "Person Detected"}</span>`;
            }

            logDiv.prepend(entry);
        }

        function updateStatusUI(isActive) {
            if (isActive) {
                statusBox.className = 'status-box active';
                statusText.innerText = 'SYSTEM: ACTIVE';
                subText.innerText = 'Monitoring for intruders...';
            } else {
                statusBox.className = 'status-box inactive';
                statusText.innerText = 'SYSTEM: INACTIVE';
                subText.innerText = 'Monitoring is disabled';
            }
        }

        function toggleSystem() {
            socket.emit('toggle_system', { isActive: !currentState });
        }
    </script>
</body>

</html>
