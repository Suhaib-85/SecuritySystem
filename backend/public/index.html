<!DOCTYPE html>
<html lang="en">

<head>
    <script>
        if (!localStorage.getItem('token')) {
            window.location.href = '/login.html';
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Dashboard</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1a1a1a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        /* Status Indicator */
        .status-box {
            padding: 20px 40px;
            border-radius: 12px;
            background: #333;
            margin-bottom: 20px;
            text-align: center;
            border: 2px solid #555;
            transition: all 0.3s ease;
            width: 80%;
            max-width: 600px;
        }

        .status-box.active {
            border-color: #00ff00;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.3);
        }

        .status-box.inactive {
            border-color: #ff4444;
            box-shadow: 0 0 15px rgba(255, 68, 68, 0.3);
        }

        h1 {
            margin: 0;
            font-size: 2rem;
        }

        .sub-text {
            opacity: 0.7;
            margin-top: 5px;
        }

        /* Controls */
        button {
            padding: 15px 30px;
            font-size: 1.2rem;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background: #007bff;
            color: white;
            font-weight: bold;
            margin-bottom: 30px;
        }

        button:hover {
            background: #0056b3;
        }

        /* Event Log */
        #log {
            width: 90%;
            max-width: 800px;
            background: #000;
            border: 1px solid #444;
            padding: 10px;
            border-radius: 8px;
        }

        .entry {
            padding: 10px;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .entry.alert {
            color: #ff4444;
            border-left: 4px solid #ff4444;
        }

        .entry.video {
            color: #44aaff;
            border-left: 4px solid #44aaff;
        }

        /* Video Link Button */
        .video-btn {
            background: #44aaff;
            color: white;
            padding: 8px 16px;
            font-size: 0.9rem;
            margin-left: 10px;
            text-decoration: none;
            /* No underline */
            border-radius: 4px;
            display: inline-block;
            transition: background 0.2s;
        }

        .video-btn:hover {
            background: #2288dd;
        }
    </style>
</head>

<body>

    <div
        style="width: 100%; max-width: 800px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid #333; padding-bottom: 10px;">
        <h2 style="margin: 0; color: #44aaff;">🛡️ Security Admin</h2>
        <button id="logoutBtn"
            style="background: #dc3545; color: white; border: none; padding: 8px 16px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: background 0.2s;">
            Log Out
        </button>
    </div>
    <div id="statusBox" class="status-box inactive">
        <h1 id="statusText">SYSTEM: LOADING...</h1>
        <div class="sub-text">Connecting to server...</div>
    </div>

    <button onclick="toggleSystem()">Toggle System Power</button>
    <button onclick="window.location.href='/gallery.html'" style="background: #28a745; margin-left: 10px;">📸 View
        Gallery</button>

    <h3>Event History (From MongoDB)</h3>
    <div id="log"></div>

    <script>
        const token = localStorage.getItem('token');
        const socket = io({
            auth: { token: token }
        });
        const statusBox = document.getElementById('statusBox');
        const statusText = document.getElementById('statusText');
        const subText = document.querySelector('.sub-text');
        const logDiv = document.getElementById('log');

        let currentState = false;

        async function loadHistory() {
            try {
                const res = await fetch('/api/events', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (res.status === 401 || res.status === 400) {
                    localStorage.removeItem('token');
                    window.location.href = '/login.html';
                    return;
                }

                const events = await res.json();
                logDiv.innerHTML = '';
                events.sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
                events.forEach(event => addEventToUI(event));
            } catch (err) {
                console.error("Failed to load history:", err);
            }
        }
        loadHistory();

        socket.on('state_update', (data) => {
            currentState = data.isActive;
            updateStatusUI(currentState);
        });

        socket.on('new_event', (event) => {
            addEventToUI(event);
        });

        function addEventToUI(event) {
            const entry = document.createElement('div');
            const time = new Date(event.timestamp).toISOString();

            // Only show intrusion start/end alerts, not upload notifications
            if (event.type === 'alert') {
                entry.className = 'entry alert';
                entry.innerHTML = `<span><strong>${time}:</strong> ${event.message || "Person Detected"}</span>`;
            } else if (event.type === 'video' && event.message.includes('Recording Uploaded')) {
                // Skip video upload notifications
                return;
            } else if (event.type === 'image' && event.message.includes('Still Image Captured')) {
                // Skip image upload notifications  
                return;
            } else {
                entry.className = 'entry video';
                entry.innerHTML = `
                    <span><strong>${time}:</strong> ${event.message}</span>
                    <a href="/video.html?id=${event.videoId}&name=${event.filename}" class="video-btn">
                        Watch Playback
                    </a>
                `;
            }

            logDiv.prepend(entry);
        }

        function updateStatusUI(isActive) {
            if (isActive) {
                statusBox.className = 'status-box active';
                statusText.innerText = 'SYSTEM: ACTIVE';
                subText.innerText = 'Monitoring for intruders...';
            } else {
                statusBox.className = 'status-box inactive';
                statusText.innerText = 'SYSTEM: INACTIVE';
                subText.innerText = 'Monitoring is disabled';
            }
        }

        function toggleSystem() {
            socket.emit('toggle_system', { isActive: !currentState });
        }

        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('token');
            window.location.href = '/login.html';
        });
    </script>
</body>

</html>
