name: Security System Automation Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  integration-verification:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-env-version: '3.11'

    - name: Install System Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install opencv-python-headless numpy python-socketio requests python-dotenv
        # Note: opencv-python-headless is used instead of opencv-python 
        # because cloud servers don't have a physical monitor attached to display GUI windows

    - name: Run Automated Test Matrix
      env:
        PI_SECRET: "ci_test_secret_key_123"
      run: |
        cd backend/test
        chmod +x run_tests.sh
        ./run_tests.sh