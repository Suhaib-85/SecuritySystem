name: Security System Automation Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  integration-verification:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Set up Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install Python System Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install opencv-python-headless numpy python-socketio requests python-dotenv
        # Note: opencv-python-headless is used instead of opencv-python 
        # because cloud servers don't have a physical monitor attached to display GUI windows

    - name: Install Node.js System Dependencies
      run: |
        cd backend
        npm install

    - name: Run Automated Test Matrix
      env:
        PI_SECRET: "7b734d45e373ec65d33d34b6e8d997b3e72ad4a6e4900a33c7e0f1b51f9917eb"
      run: |
        cd backend/test
        chmod +x run_tests.sh
        ./run_tests.sh