name: Security System Automation Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  integration-verification:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Set up Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: 'lts/*'

    - name: Install Python System Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install opencv-python-headless numpy python-socketio requests python-dotenv
        # Note: opencv-python-headless is used instead of opencv-python 
        # because cloud servers don't have a physical monitor attached to display GUI windows

    - name: Install Node.js System Dependencies
      run: |
        cd backend
        npm install

    - name: Start Backend Server
      env:
        PI_SECRET: ${{ secrets.PI_SECRET }}
        MONGO_URI: ${{ secrets.MONGO_URI }}
        PORT: ${{ secrets.PORT }}
        NODE_ENV: ${{ secrets.NODE_ENV }}
        JWT_SECRET: ${{ secrets.JWT_SECRET }}
      run: |
        cd backend
        node server.js &
        sleep 5

    - name: Run Automated Test Matrix
      env:
        PI_SECRET: ${{ secrets.PI_SECRET }}
        JWT_SECRET: ${{ secrets.JWT_SECRET }}
        MONGO_URI: ${{ secrets.MONGO_URI }}
        PORT: ${{ secrets.PORT }}
        NODE_ENV: ${{ secrets.NODE_ENV }}
      run: |
        cd backend/test
        chmod +x run_tests.sh
        ./run_tests.sh

    - name: Debug deprecations
      run: node --trace-deprecation backend/server.js